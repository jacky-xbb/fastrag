# push 到 main：先检查（typecheck + 单测）→ 构建前端 → 部署到 Cloudflare Workers。
# 检查不绿则不部署。需在仓库 Secrets 配 CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID。
# Worker 运行时 secrets（OPENROUTER/PADDLE/TAVILY/TURSO_*/ADMIN_*/SESSION_SECRET）在 CF 侧配一次，CI 不推。
name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 生成 worker-configuration.d.ts（离线、免鉴权），供 typecheck 用。
      - run: pnpm exec wrangler types
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run ui:build
      - name: Deploy to Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: deploy
